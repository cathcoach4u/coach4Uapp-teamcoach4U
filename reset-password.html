<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Teams Coach4U</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-navy: #1B3664;
      --color-blue: #5684C4;
      --color-body: #2D2D2D;
      --color-border: #DDDDDD;
      --font-heading: 'Inter', sans-serif;
      --font-body: 'Montserrat', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--color-navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: var(--font-body); color: var(--color-body); }
    a { color: var(--color-blue); }
    .login-card { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); padding: 40px 36px; width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--color-navy); margin: 0 0 4px; }
    .login-logo p { font-size: 14px; color: var(--color-body); margin: 0; }
    .form-group { display: flex; flex-direction: column; margin-bottom: 14px; }
    label { font-size: 13px; font-weight: 700; font-family: var(--font-heading); color: var(--color-body); margin-bottom: 6px; }
    .field-input { border: 1px solid var(--color-border); border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: var(--font-body); color: var(--color-body); width: 100%; outline: none; }
    .field-input:focus { border-color: var(--color-blue); box-shadow: 0 0 0 3px rgba(86,132,196,0.15); }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-family: var(--font-heading); font-weight: 700; cursor: pointer; border: 1px solid transparent; text-align: center; text-decoration: none; }
    .btn-primary { background: var(--color-navy); color: #fff; border-color: var(--color-navy); }
    .btn-primary:hover { background: var(--color-blue); border-color: var(--color-blue); }
    .alert { border-radius: 6px; padding: 10px 14px; font-size: 14px; margin-bottom: 14px; display: none; }
    .alert-error { background: #f8d7da; color: #721c24; }
    .alert-success { background: #d4edda; color: #155724; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>Teams Coach4U</h1>
      <p>Choose a new password</p>
    </div>
    <form id="reset-form">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" class="field-input" required minlength="8" />
      </div>
      <div id="msg" class="alert"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px">Update Password</button>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const msgEl    = document.getElementById('msg');

      const { error } = await supabase.auth.updateUser({ password });
      msgEl.style.display = 'block';
      if (error) {
        msgEl.className = 'alert alert-error';
        msgEl.textContent = error.message;
      } else {
        msgEl.className = 'alert alert-success';
        msgEl.textContent = 'Password updated. Redirecting to sign in.';
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });
  </script>
</body>
</html>
