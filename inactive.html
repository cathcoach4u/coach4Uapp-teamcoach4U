<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="design-system-version" content="1.3" />
  <title>Account Inactive — Teams Coach4U</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-navy: #1B3664;
      --color-blue: #5684C4;
      --color-body: #2D2D2D;
      --color-border: #DDDDDD;
      --font-heading: 'Inter', 'Aptos', 'Calibri', sans-serif;
      --font-body: 'Montserrat', 'Aptos', 'Calibri', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: linear-gradient(135deg, #1B3664 0%, #5684C4 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: var(--font-body); color: var(--color-body); }
    a { color: var(--color-blue); font-family: var(--font-body); font-weight: 500; font-size: 14px; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 12px 48px rgba(0,0,0,0.35); padding: 44px 40px; width: 100%; max-width: 420px; text-align: center; }
    .login-logo h1 { font-family: var(--font-heading); font-size: 36px; font-weight: 700; color: var(--color-navy); margin: 0 0 8px; }
    .login-logo h2 { font-family: var(--font-heading); font-size: 26px; font-weight: 700; color: var(--color-navy); margin: 0 0 12px; }
    .login-logo p { font-family: var(--font-body); font-size: 15px; font-weight: 400; color: #6C757D; line-height: 1.6; margin: 0 0 24px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>Teams Coach4U</h1>
      <h2>Account Inactive</h2>
      <p>Your membership is not currently active. Please contact your Coach4U administrator to restore access.</p>
    </div>
    <a href="login.html">Back to sign in</a>
  </div>
</body>
</html>
