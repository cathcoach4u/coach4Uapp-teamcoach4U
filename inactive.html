<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="design-system-version" content="1.3" />
  <title>Account Inactive — Teams Coach4U</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-navy: #1B3664;
      --color-blue: #5684C4;
      --color-body: #2D2D2D;
      --color-border: #DDDDDD;
      --font-heading: 'Inter', sans-serif;
      --font-body: 'Montserrat', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--color-navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: var(--font-body); color: var(--color-body); }
    a { color: var(--color-blue); }
    .login-card { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); padding: 40px 36px; width: 100%; max-width: 380px; text-align: center; }
    .login-logo h1 { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--color-navy); margin: 0 0 12px; }
    .login-logo p { font-size: 14px; color: var(--color-body); line-height: 1.6; margin: 0 0 24px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>Account Inactive</h1>
      <p>Your membership is not currently active. Please contact your Coach4U administrator to restore access.</p>
    </div>
    <a href="login.html">Back to sign in</a>
  </div>
</body>
</html>
