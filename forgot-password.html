<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — The Strategic Hub</title>
  <link rel="stylesheet" href="https://cathcoach4u.github.io/coach4u-shared/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #003366; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: #003366; margin-top: 8px; }
    .login-logo p { font-size: 13px; color: #6C757D; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #6C757D; margin-bottom: 5px; }
    input { display: block; width: 100%; padding: 10px 12px; border: 1.5px solid #DEE2E6; border-radius: 6px; font-size: 14px; transition: border-color 0.15s; }
    input:focus { outline: none; border-color: #003366; box-shadow: 0 0 0 3px rgba(0,51,102,0.12); }
    .btn-full { display: block; width: 100%; padding: 12px; background: #003366; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
    .btn-full:hover { background: #002244; }
    .alert { padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 14px; display: none; }
    .alert-error { background: #FEE2E2; color: #991B1B; }
    .alert-success { background: #D1FAE5; color: #065F46; }
    .back-link { text-align: center; margin-top: 16px; font-size: 13px; }
    .back-link a { color: #0D9488; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>The Strategic Hub</h1>
      <p>Reset your password</p>
    </div>
    <div id="msg" class="alert"></div>
    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com" />
      </div>
      <button type="submit" class="btn-full">Send Reset Link</button>
    </form>
    <div class="back-link"><a href="login.html">← Back to sign in</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const msgEl = document.getElementById('msg');
      const redirectTo = window.location.href.replace('forgot-password.html', 'reset-password.html');
      const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });
      msgEl.style.display = 'block';
      if (error) {
        msgEl.className = 'alert alert-error';
        msgEl.textContent = error.message;
      } else {
        msgEl.className = 'alert alert-success';
        msgEl.textContent = 'Check your email for a reset link.';
      }
    });
  </script>
</body>
</html>
