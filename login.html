<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Teams Coach4U</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400&display=swap" rel="stylesheet" />
  <style>
    body { background: #1B3664; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); padding: 40px 36px; width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: #1B3664; }
    .login-logo p { font-size: 14px; color: #6C757D; margin-top: 4px; }
    .alert-error { background: #f8d7da; color: #721c24; border-radius: 6px; padding: 10px 14px; font-size: 14px; margin-bottom: 14px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>Teams Coach4U</h1>
      <p>Sign in to your account</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="field-input" required autocomplete="username" />
      </div>
      <div class="form-group" style="margin-top:14px">
        <label for="password">Password</label>
        <input type="password" id="password" class="field-input" required autocomplete="current-password" />
      </div>
      <div id="error-msg" class="alert-error"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px">Sign In</button>
      <p style="text-align:center;margin-top:14px;font-size:0.875rem">
        <a href="forgot-password.html">Forgot password?</a>
      </p>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
