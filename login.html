<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="design-system-version" content="1.3" />
  <title>Sign In — Teams Coach4U</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-navy: #1B3664;
      --color-blue: #5684C4;
      --color-body: #2D2D2D;
      --color-border: #DDDDDD;
      --font-heading: 'Inter', 'Aptos', 'Calibri', sans-serif;
      --font-body: 'Montserrat', 'Aptos', 'Calibri', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: linear-gradient(135deg, #1B3664 0%, #5684C4 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: var(--font-body); color: var(--color-body); }
    a { color: var(--color-blue); font-family: var(--font-body); font-weight: 500; font-size: 14px; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 12px 48px rgba(0,0,0,0.35); padding: 44px 40px; width: 100%; max-width: 420px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 { font-family: var(--font-heading); font-size: 36px; font-weight: 700; color: var(--color-navy); margin: 0 0 8px; }
    .login-logo p { font-family: var(--font-body); font-size: 15px; font-weight: 400; color: #6C757D; margin: 0; }
    .form-group { display: flex; flex-direction: column; margin-bottom: 16px; }
    label { font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--color-body); margin-bottom: 6px; }
    .field-input { border: 1px solid var(--color-border); border-radius: 8px; padding: 11px 14px; font-size: 15px; font-family: var(--font-body); font-weight: 400; color: var(--color-body); background: #fff; width: 100%; outline: none; }
    .field-input:focus { border-color: var(--color-blue); box-shadow: 0 0 0 3px rgba(86,132,196,0.15); }
    .password-wrap { position: relative; }
    .password-wrap .field-input { padding-right: 60px; }
    .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 13px; font-weight: 400; color: #6C757D; padding: 0; }
    .btn { display: block; width: 100%; padding: 13px 20px; border-radius: 8px; font-size: 16px; font-family: var(--font-body); font-weight: 600; cursor: pointer; border: none; text-align: center; text-decoration: none; margin-top: 8px; }
    .btn-primary { background: var(--color-navy); color: #fff; }
    .btn-primary:hover { background: var(--color-blue); }
    .alert { border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 14px; display: none; }
    .alert-error { background: #f8d7da; color: #721c24; }
    .alert-success { background: #d4edda; color: #155724; }
    .form-footer { text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>Teams Coach4U</h1>
      <p>Sign in to access your account.</p>
    </div>
    <form id="signInForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="field-input" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" class="field-input" required autocomplete="current-password" />
          <button type="button" class="password-toggle" id="toggle-password">Show</button>
        </div>
      </div>
      <div id="message" class="alert alert-error"></div>
      <button type="submit" id="login-btn" class="btn btn-primary">Sign In</button>
      <p class="form-footer"><a href="forgot-password.html">Forgot password?</a></p>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    document.getElementById('toggle-password').addEventListener('click', () => {
      const pw  = document.getElementById('password');
      const btn = document.getElementById('toggle-password');
      if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'Hide'; }
      else { pw.type = 'password'; btn.textContent = 'Show'; }
    });

    document.getElementById('signInForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('message');

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
